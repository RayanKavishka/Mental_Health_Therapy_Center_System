# Database connection
jakarta.persistence.jdbc.driver=com.mysql.cj.jdbc.Driver
jakarta.persistence.jdbc.url=jdbc:mysql://localhost:3306/mentalHealthTherapyCenter?createDatabaseIfNotExist=true
jakarta.persistence.jdbc.user=root
jakarta.persistence.jdbc.password=mysql

# Hibernate dialect
hibernate.dialect=org.hibernate.dialect.MySQLDialect

# DDL auto
hibernate.hbm2ddl.auto=update

# SQL logging (enable if needed)
hibernate.show_sql=true
hibernate.format_sql=true

# Second Level Cache
hibernate.cache.use_second_level_cache=true
hibernate.cache.use_query_cache=true
hibernate.cache.region.factory_class=org.hibernate.cache.jcache.JCacheRegionFactory
hibernate.javax.cache.provider=org.ehcache.jsr107.EhcacheCachingProvider
hibernate.javax.cache.uri=classpath:ehcache.xml